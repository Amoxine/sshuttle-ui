name: Release

# Builds installers when semantic-release (or any process) pushes tag v*.
# The GitHub Release + notes are created by semantic-release first; this workflow
# attaches Tauri bundles to that release (releaseDraft must match: published).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          - platform: ubuntu-22.04
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v6

      # macOS DMG bundling occasionally fails when a previous hdiutil mount
      # lingers — detach anything named like our product before rebuilding.
      - name: Clean stale DMG mounts (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set +e
          for vol in "/Volumes/sshuttle UI" "/Volumes/sshuttle-ui"; do
            hdiutil detach "$vol" 2>/dev/null || true
          done
          rm -rf "$RUNNER_TEMP/tauri-dmg-"* 2>/dev/null || true

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Linux dependencies (WebKit + GTK)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS deps
        run: npm ci

      - name: Validate Tauri signing secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY secret."
            exit 1
          fi

          # Tauri updater keys are minisign keys and should include comment lines.
          if ! printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" | grep -q "untrusted comment:"; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY looks malformed (missing minisign comment lines). Paste the full multiline private key content."
            exit 1
          fi

          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD+x}" ]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY_PASSWORD secret (set empty string only if your key has no password)."
            exit 1
          fi

      # TAURI_SIGNING_PRIVATE_KEY must be a repo/org secret for signed
      # updater artifacts. Without it, `tauri build` still produces
      # installers, but signature files / updater JSON must be handled
      # manually — see docs/DISTRIBUTION.md.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          tagName: v__VERSION__
          releaseName: "sshuttle UI v__VERSION__"
          releaseDraft: false
          prerelease: false
