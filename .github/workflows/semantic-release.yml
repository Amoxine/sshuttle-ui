# Bump semver (Conventional Commits), update changelog + manifests, tag, GitHub Release.
# This runs only after CI succeeds on main.

name: Semantic release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: semantic-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version & GitHub release
    runs-on: ubuntu-latest
    # For workflow_run, only continue when CI is green.
    # For manual runs, only allow dispatches started from main.
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || (github.event_name == 'workflow_dispatch' && github.ref_name == 'main') }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
          # Run semantic-release for the CI-validated commit.
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v6
        with:
          # semantic-release ^25 requires ^22.14.0 || >=24.10.0
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install JS deps
        run: npm ci

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
