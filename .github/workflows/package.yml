name: Package

# Build installers for released versions from immutable v* tags.
# This is separate from release.yml, which publishes artifacts to GitHub Releases.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to package (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  # Keep release packaging immutable; never cancel in-progress runs.
  group: package-${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  package:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.ref_name == 'main' && startsWith(github.event.inputs.release_tag, 'v')) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          - platform: ubuntu-22.04
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v6
        with:
          # For tags, package the exact released tag commit.
          # For manual runs, package the explicitly requested tag.
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref }}

      - name: Clean stale DMG mounts (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set +e
          for vol in "/Volumes/sshuttle UI" "/Volumes/sshuttle-ui"; do
            hdiutil detach "$vol" 2>/dev/null || true
          done
          rm -rf "$RUNNER_TEMP/tauri-dmg-"* 2>/dev/null || true

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Linux dependencies (WebKit + GTK)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS deps
        run: npm ci

      # Build Tauri bundles and upload them as workflow artifacts (no GitHub release).
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: "[name]-[version]-[platform]-[arch]-[bundle]"
