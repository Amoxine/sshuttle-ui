name: Package

# Build installers after semantic-release completes successfully on main.
# This is separate from release.yml, which publishes artifacts to GitHub Releases on v* tags.
on:
  workflow_run:
    workflows: ["Semantic release"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Keep packaging immutable per run; never cancel in-progress builds.
  group: package-${{ github.workflow }}-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: false

jobs:
  package:
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || (github.event_name == 'workflow_dispatch' && github.ref_name == 'main') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          - platform: ubuntu-22.04
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v6
        with:
          # For chained runs, package the same commit semantic-release evaluated.
          # For manual runs, package the checked-out ref (main only due to job guard).
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Clean stale DMG mounts (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set +e
          for vol in "/Volumes/sshuttle UI" "/Volumes/sshuttle-ui"; do
            hdiutil detach "$vol" 2>/dev/null || true
          done
          rm -rf "$RUNNER_TEMP/tauri-dmg-"* 2>/dev/null || true

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Linux dependencies (WebKit + GTK)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS deps
        run: npm ci

      # Build Tauri bundles and upload them as workflow artifacts (no GitHub release).
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: "[name]-[version]-[platform]-[arch]-[bundle]"
