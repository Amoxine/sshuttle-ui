name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JS deps
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Production frontend bundle
        run: npm run build

  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Linux dependencies (Tauri link + GTK)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Ensure frontendDist exists for Tauri compile-time context
        run: |
          mkdir -p dist
          test -f dist/index.html || printf '<!doctype html>\n' > dist/index.html

      - name: Rustfmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Bindings up-to-date (tauri-specta)
        run: |
          if ! git diff --exit-code -- src/bindings.ts; then
            echo "::error::src/bindings.ts is stale. Run \`cargo test --manifest-path src-tauri/Cargo.toml\` locally and commit the updated file." >&2
            exit 1
          fi

      - name: Debug build (link smoke test)
        run: cargo build --manifest-path src-tauri/Cargo.toml
